<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiebilum Copy QA | 文案勘誤建議</title>
  <style>
    :root {
      --paper: #fbfaf7;
      --panel: #ffffff;
      --ink: #25211d;
      --muted: #6f6960;
      --line: #ded8cd;
      --cane: #b58b28;
      --clay: #9c5f45;
      --leaf: #42614d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      line-height: 1.6;
    }

    .container {
      width: min(760px, calc(100% - 32px));
      margin: 32px auto;
      padding: 28px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    header {
      border-bottom: 1px solid var(--line);
      padding-bottom: 20px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
      letter-spacing: 0;
    }

    .note {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .alert {
      background: #fff8e8;
      border: 1px solid #e3cf9a;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 24px;
      font-size: 0.92rem;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      font-size: 0.92rem;
    }

    input[type="text"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--ink);
      background: #fff;
      font: inherit;
    }

    textarea { min-height: 108px; resize: vertical; }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .risk-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fffdf9;
    }

    .risk-option {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
    }

    .submit-btn {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--leaf);
      border-radius: 6px;
      background: var(--leaf);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .submit-btn:hover { background: #344e3e; }

    @media (max-width: 640px) {
      .container { padding: 20px; }
      .two-col,
      .risk-group { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <h1>文案勘誤建議</h1>
      <p class="note">鐵比倫 Tiebilum | 給 QDM、CIS 與行銷協作夥伴使用</p>
    </header>

    <div class="alert">
      <strong>請先知道：</strong>
      此表單只提交修改建議，不會直接更新官網或資料庫。所有建議會先進入審核佇列，經品牌主確認後才會合併到正式文案。
    </div>

    <form action="https://docs.google.com/forms/d/e/1FAIpQLSfyeou3ukgpNcMHNfMPMJ0RQLh41B7zJDqFM5RHnd7gRLCRxA/formResponse" method="POST">
      <div class="form-group">
        <label for="name">提交者姓名 / 團隊窗口</label>
        <input type="text" id="name" name="entry.2123479839" placeholder="例如：王小明" required>
      </div>

      <div class="form-group">
        <label for="team">所屬團隊</label>
        <select id="team" name="entry.646239155" required>
          <option value="QDM">QDM 開店平台</option>
          <option value="CIS">CIS 視覺團隊</option>
          <option value="Marketing">行銷團隊</option>
          <option value="Owner">品牌主</option>
          <option value="Other">其他</option>
        </select>
      </div>

      <div class="two-col">
        <div class="form-group">
          <label for="page">頁面位置</label>
          <input type="text" id="page" name="entry.1975926631" placeholder="例如：首頁、商品頁" required>
        </div>
        <div class="form-group">
          <label for="slot">文案位置</label>
          <input type="text" id="slot" name="entry.2072243088" placeholder="例如：主標、副標、商品描述" required>
        </div>
      </div>

      <div class="form-group">
        <label for="original">原文</label>
        <textarea id="original" name="entry.1748068185" placeholder="貼上目前 dashboard 或官網上的原文"></textarea>
      </div>

      <div class="form-group">
        <label for="suggested">建議修正版</label>
        <textarea id="suggested" name="entry.20185533" placeholder="請填寫建議替換的完整文字" required></textarea>
      </div>

      <div class="form-group">
        <label for="reason">修改原因</label>
        <textarea id="reason" name="entry.723310763" placeholder="說明為什麼需要修改，例如語氣不符、來源不足、過度宣稱" required></textarea>
      </div>

      <div class="form-group">
        <label for="evidence">來源依據 / 參考資料</label>
        <input type="text" id="evidence" name="entry.1812378672" placeholder="例如：wiki 頁面、照片檔名、訪談紀錄">
      </div>

      <div class="form-group">
        <label>可能風險</label>
        <div class="risk-group">
          <label class="risk-option"><input type="checkbox" name="entry.116248035" value="medical-risk"> 療效或健康暗示</label>
          <label class="risk-option"><input type="checkbox" name="entry.116248035" value="marketing-fluff"> 浮誇行銷語</label>
          <label class="risk-option"><input type="checkbox" name="entry.116248035" value="unsupported-claim"> 缺少來源依據</label>
          <label class="risk-option"><input type="checkbox" name="entry.116248035" value="tone-mismatch"> 品牌語氣不符</label>
        </div>
      </div>

      <button type="submit" class="submit-btn">提交建議</button>
    </form>
  </main>
</body>
</html>
