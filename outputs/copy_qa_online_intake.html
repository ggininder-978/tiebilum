<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiebilum Copy QA - 提出文案建議</title>
  <style>
    :root {
      --ink: #2d3436;
      --cane: #a58e6f;
      --panel: #fdfaf3;
      --line: #e0e0e0;
      --muted: #636e72;
      --risk: #d63031;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: var(--ink);
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      padding: 32px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .header {
      border-bottom: 2px solid var(--line);
      padding-bottom: 24px;
      margin-bottom: 32px;
    }

    h1 { color: var(--cane); margin: 0 0 8px 0; }
    .note { font-size: 0.9rem; color: var(--muted); }

    .alert {
      background: var(--panel);
      border: 1px solid var(--cane);
      padding: 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 32px;
    }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.95rem; }
    
    input[type="text"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 1rem;
    }

    textarea { min-height: 100px; }

    .risk-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      background: #f9f9f9;
      padding: 16px;
      border-radius: 6px;
    }

    .risk-option { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }

    .submit-btn {
      background: var(--ink);
      color: #fff;
      border: none;
      padding: 16px 32px;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      font-size: 1.1rem;
      margin-top: 20px;
    }

    .submit-btn:hover { filter: opacity(0.9); }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>文案勘誤與建議提交</h1>
      <p class="note">鐵比倫品牌資料室 - 外部協作入口</p>
    </header>

    <div class="alert">
      <strong>⚠️ 協作聲明：</strong><br>
      此表單僅用於提交「建議」，提交後將由品牌業主進行審核，不會直接修改官網或資料庫。請勿在此提交任何機密資訊或 HTML 標籤。
    </div>

    <!-- 建議將 action 替換為實際的 Google Form 或 Formspree URL -->
    <form action="YOUR_FORM_BACKEND_URL" method="POST">
      <div class="form-group">
        <label for="name">您的姓名 / 提交者</label>
        <input type="text" id="name" name="submitterName" placeholder="例如：王小明" required>
      </div>

      <div class="form-group">
        <label for="team">所屬團隊</label>
        <select id="team" name="submitterTeam" required>
          <option value="QDM">QDM 官網團隊</option>
          <option value="CIS">CIS 視覺團隊</option>
          <option value="Marketing">行銷夥伴</option>
          <option value="Owner">業主</option>
          <option value="Other">其他</option>
        </select>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
        <div class="form-group">
          <label for="page">頁面位置</label>
          <input type="text" id="page" name="page" placeholder="例如：首頁" required>
        </div>
        <div class="form-group">
          <label for="slot">文案位置</label>
          <input type="text" id="slot" name="slot" placeholder="例如：主標" required>
        </div>
      </div>

      <div class="form-group">
        <label for="original">原文 (AI 產出版)</label>
        <textarea id="original" name="originalText" placeholder="請貼上目前在 Dashboard 看到的文案"></textarea>
      </div>

      <div class="form-group">
        <label for="suggested">建議修正版本</label>
        <textarea id="suggested" name="suggestedRevision" placeholder="請輸入您建議的修改內容" required></textarea>
      </div>

      <div class="form-group">
        <label for="reason">修改原因</label>
        <textarea id="reason" name="reason" placeholder="為什麼需要修改？(例如：語氣太浮誇)" required></textarea>
      </div>

      <div class="form-group">
        <label for="evidence">來源依據 / 參考資料</label>
        <input type="text" id="evidence" name="sourceEvidence" placeholder="例如：wiki 品牌歷史頁面第 3 段">
      </div>

      <div class="form-group">
        <label>潛在風險標記 (可複選)</label>
        <div class="risk-group">
          <label class="risk-option"><input type="checkbox" name="risk" value="medical-risk"> 涉及療效暗示</label>
          <label class="risk-option"><input type="checkbox" name="risk" value="marketing-fluff"> 語氣過於浮誇</label>
          <label class="risk-option"><input type="checkbox" name="risk" value="unsupported-claim"> 缺乏來源依據</label>
          <label class="risk-option"><input type="checkbox" name="risk" value="tone-mismatch"> 不符品牌語氣</label>
        </div>
      </div>

      <button type="submit" class="submit-btn">提交建議</button>
    </form>
  </div>
</body>
</html>
