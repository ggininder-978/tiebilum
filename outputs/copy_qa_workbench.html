<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiebilum Copy QA Workbench</title>
  <style>
    :root {
      --ink: #2d3436;
      --cane: #a58e6f;
      --panel: #fdfaf3;
      --line: #e0e0e0;
      --muted: #636e72;
      --risk: #d63031;
    }

    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: var(--ink);
      margin: 0;
      padding: 0;
      line-height: 1.5;
    }

    .topbar {
      background: var(--ink);
      color: #fff;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .container {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 20px;
    }

    .stats-bar {
      background: #fff;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      display: flex;
      gap: 24px;
      border: 1px solid var(--line);
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-val { font-weight: 900; font-size: 1.2rem; color: var(--cane); }
    .stat-lbl { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; }

    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .filter-group label { font-size: 0.7rem; font-weight: 700; color: var(--muted); }
    select, input {
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 4px;
    }

    .qa-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 24px;
    }

    .qa-info h3 { margin: 0 0 8px 0; color: var(--cane); font-size: 1.1rem; }
    .qa-meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 16px; }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-right: 6px;
    }

    .tag.risk { background: #ffeaa7; color: #d63031; }
    .tag.approved { background: #55efc4; color: #00b894; }

    .draft-box {
      background: var(--panel);
      padding: 12px;
      border-radius: 6px;
      font-style: italic;
      margin-bottom: 12px;
    }

    .revision-area textarea {
      width: 100%;
      min-height: 80px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom: 12px;
    }

    .status-select { width: 100%; padding: 10px; margin-bottom: 12px; font-weight: 700; }

    .save-btn {
      background: var(--cane);
      color: #fff;
      border: none;
      padding: 12px 32px;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
    }

    .save-btn:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
  <div class="topbar">
    <strong>Tiebilum Copy QA Workbench</strong>
    <button class="save-btn" onclick="saveAll()">儲存全部變更</button>
  </div>

  <div class="container">
    <div class="stats-bar" id="stats"></div>

    <div class="filters">
      <div class="filter-group">
        <label>狀態</label>
        <select id="statusFilter" onchange="render()"><option value="all">全部狀態</option></select>
      </div>
      <div class="filter-group">
        <label>頁面</label>
        <select id="pageFilter" onchange="render()"><option value="all">全部頁面</option></select>
      </div>
    </div>

    <div id="qa-list"></div>
  </div>

  <script>
    let state = { items: [] };

    async function load() {
      const res = await fetch('/api/copy-qa');
      state = await res.json();
      populateFilters();
      render();
    }

    function populateFilters() {
      const statuses = ['all', ...new Set(state.items.map(i => i.reviewStatus))];
      const pages = ['all', ...new Set(state.items.map(i => i.page))];
      document.getElementById('statusFilter').innerHTML = statuses.map(s => `<option value="${s}">${s}</option>`).join('');
      document.getElementById('pageFilter').innerHTML = pages.map(p => `<option value="${p}">${p}</option>`).join('');
    }

    function render() {
      const statusF = document.getElementById('statusFilter').value;
      const pageF = document.getElementById('pageFilter').value;
      
      const filtered = state.items.filter(i => 
        (statusF === 'all' || i.reviewStatus === statusF) &&
        (pageF === 'all' || i.page === pageF)
      );

      // Stats
      document.getElementById('stats').innerHTML = `
        <div class="stat-item"><span class="stat-val">${state.items.length}</span><span class="stat-lbl">Total</span></div>
        <div class="stat-item"><span class="stat-val">${state.items.filter(i => i.reviewStatus === 'pending').length}</span><span class="stat-lbl">Pending</span></div>
        <div class="stat-item"><span class="stat-val">${state.items.filter(i => i.reviewStatus === 'approved' || i.reviewStatus === 'revised').length}</span><span class="stat-lbl">Ready</span></div>
      `;

      document.getElementById('qa-list').innerHTML = filtered.map((item, idx) => `
        <div class="qa-card">
          <div class="qa-info">
            <h3>${item.page} - ${item.slot}</h3>
            <div class="qa-meta">ID: ${item.id}</div>
            <div style="margin-bottom: 12px;">
              ${item.riskTags.map(t => `<span class="tag risk">${t}</span>`).join('')}
            </div>
            <div class="draft-box">
              AI 原文：<br>
              ${item.aiDraft.replace(/\n/g, '<br>')}
            </div>
            <div style="font-size: 0.8rem; color: var(--muted);">來源: ${item.source.join(', ')}</div>
          </div>
          <div class="revision-area">
            <label style="font-size: 0.75rem; font-weight: 700; color: var(--muted);">人工修正文案</label>
            <textarea oninput="updateItem(${idx}, 'humanRevision', this.value)" placeholder="若無修正則保留空白使用原文...">${item.humanRevision || ''}</textarea>
            
            <label style="font-size: 0.75rem; font-weight: 700; color: var(--muted);">審核備註</label>
            <textarea oninput="updateItem(${idx}, 'reviewNote', this.value)" style="min-height: 50px;" placeholder="勘誤原因或建議...">${item.reviewNote || ''}</textarea>

            <label style="font-size: 0.75rem; font-weight: 700; color: var(--muted);">審核狀態</label>
            <select class="status-select" onchange="updateItem(${idx}, 'reviewStatus', this.value)">
              <option value="pending" ${item.reviewStatus === 'pending' ? 'selected' : ''}>Pending</option>
              <option value="approved" ${item.reviewStatus === 'approved' ? 'selected' : ''}>Approved (Use Draft)</option>
              <option value="revised" ${item.reviewStatus === 'revised' ? 'selected' : ''}>Revised (Use Revision)</option>
              <option value="rejected" ${item.reviewStatus === 'rejected' ? 'selected' : ''}>Rejected</option>
              <option value="needs-source" ${item.reviewStatus === 'needs-source' ? 'selected' : ''}>Needs Source</option>
            </select>
          </div>
        </div>
      `).join('');
    }

    function updateItem(idx, key, val) {
      state.items[idx][key] = val;
    }

    async function saveAll() {
      try {
        const res = await fetch('/api/copy-qa', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(state)
        });
        if (res.ok) {
          alert('儲存成功！JSON、Markdown 與 Audit 已同步更新。');
          load();
        } else {
          alert('儲存失敗。');
        }
      } catch (e) {
        alert('連線錯誤。');
      }
    }

    load();
  </script>
</body>
</html>
